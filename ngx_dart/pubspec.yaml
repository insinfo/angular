name: ngx_dart
description: >-
  Fast and productive web framework by Google.
  Separate, but similar to the JavaScript framework with a similar name.
version: 8.0.1
homepage: https://insinfo.github.io/angular
repository: https://github.com/insinfo/angular

resolution: workspace

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  build: ^2.4.1
  built_collection: ^5.1.1
  built_value: ^8.7.0
  collection: ^1.18.0
  intl: ^0.18.1
  js: ^0.6.7
  meta: ^1.11.0
  ngx_compiler: ^3.0.0
  stream_transform: ^2.1.0

dev_dependencies:
  lints: ^2.1.0

  # minimal versions to support null safety and class modifiers
  build_runner: ^2.4.6
  build_web_compilers: ^4.0.4
  watcher: ^1.1.0
