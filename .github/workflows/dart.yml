# CI for the master branch (9.0.0-dev line) of the insinfo/angular fork.
#
# master carries the ngx_* package names and the ongoing package:web /
# dart:js_interop migration. Nothing is published from this branch.
name: Dart CI
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
defaults:
  run:
    shell: bash
env:
  PUB_ENVIRONMENT: bot.github
permissions: read-all

jobs:
  analyze:
    name: "analyze; Dart 3.6.2; all packages"
    runs-on: ubuntu-latest
    steps:
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6.2"
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Resolve workspace
        run: dart pub get
      - name: Analyze packages
        run: |
          for pkg in ngx_ast ngx_compiler ngx_dart ngx_forms ngx_router ngx_test; do
            echo "::group::dart analyze $pkg"
            (cd $pkg && dart analyze --no-fatal-warnings)
            echo "::endgroup::"
          done

  package_tests:
    name: "test; Dart 3.6.2; PKG: ${{ matrix.package }}"
    runs-on: ubuntu-latest
    needs: analyze
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ngx_ast
            command: dart run test -P ci
          - package: ngx_compiler
            command: dart run test -P ci
          - package: ngx_forms
            command: dart run build_runner test --delete-conflicting-outputs --fail-on-severe -- -P ci
          - package: ngx_router
            command: dart run build_runner test --delete-conflicting-outputs --fail-on-severe -- -P ci
          - package: ngx_test
            command: dart run build_runner test --delete-conflicting-outputs --fail-on-severe -- -P ci
    steps:
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6.2"
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Resolve workspace
        run: dart pub get
      - name: "${{ matrix.package }}; ${{ matrix.command }}"
        run: ${{ matrix.command }}
        working-directory: ${{ matrix.package }}

  framework_tests:
    name: "test; Dart 3.6.2; PKG: _tests (vm + browser)"
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6.2"
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Resolve workspace
        run: dart pub get
      - name: "_tests; dart run build_runner build --fail-on-severe"
        run: dart run build_runner build --delete-conflicting-outputs --fail-on-severe
        working-directory: _tests
      - name: "_tests; dart run test -P vm"
        run: dart run test -P vm
        working-directory: _tests
      - name: "_tests; dart run build_runner test --fail-on-severe -- -P browser"
        run: dart run build_runner test --fail-on-severe -- -P browser
        working-directory: _tests

  builds:
    name: "build; Dart 3.6.2; goldens + hello_world"
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6.2"
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Resolve workspace
        run: dart pub get
      - name: "goldens; dart run build_runner build --fail-on-severe"
        run: dart run build_runner build --delete-conflicting-outputs --fail-on-severe
        working-directory: goldens
      - name: "hello_world; dart run build_runner build --fail-on-severe"
        run: dart run build_runner build --delete-conflicting-outputs --fail-on-severe
        working-directory: examples/hello_world
