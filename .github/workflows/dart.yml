# CI for the angular9 branch of the insinfo/angular fork.
#
# This branch renames the packages to the ngx_* family (ngx_core, ngx_forms,
# ngx_router, ngx_test, ngx_ast, ngx_compiler) for stable publishing; the code
# itself matches the angular8 branch (pub.dev-faithful sources).
name: Dart CI
on:
  push:
    branches:
      - angular9
  pull_request:
    branches:
      - angular9
defaults:
  run:
    shell: bash
env:
  PUB_ENVIRONMENT: bot.github
permissions: read-all

jobs:
  analyze:
    name: "analyze; Dart 3.6.2; all packages"
    runs-on: ubuntu-latest
    steps:
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6.2"
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Resolve workspace
        run: dart pub get
      # The published sources predate the Dart 3.6 analyzer, which added a few
      # new warnings (e.g. unreachable_switch_default); since this branch must
      # not modify the published code, only errors fail the build.
      - name: Analyze packages
        run: |
          for pkg in ngx_ast ngx_compiler ngx_core ngx_forms ngx_router ngx_test; do
            echo "::group::dart analyze $pkg"
            (cd $pkg && dart analyze --no-fatal-warnings)
            echo "::endgroup::"
          done

  package_tests:
    name: "test; Dart 3.6.2; PKG: ${{ matrix.package }}"
    runs-on: ubuntu-latest
    needs: analyze
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: ngx_ast
            command: dart run test -P ci
          - package: ngx_compiler
            command: dart run test -P ci
          # --delete-conflicting-outputs: the pub.dev-published packages ship
          # their generated *.mocks.dart files, which build_runner detects as
          # pre-existing outputs and asks permission to replace (impossible in
          # a non-interactive runner, exit code 78).
          - package: ngx_forms
            command: dart run build_runner test --delete-conflicting-outputs --fail-on-severe -- -P ci
          - package: ngx_router
            command: dart run build_runner test --delete-conflicting-outputs --fail-on-severe -- -P ci
          - package: ngx_test
            command: dart run build_runner test --delete-conflicting-outputs --fail-on-severe -- -P ci
    steps:
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6.2"
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Resolve workspace
        run: dart pub get
      - name: "${{ matrix.package }}; ${{ matrix.command }}"
        run: ${{ matrix.command }}
        working-directory: ${{ matrix.package }}

  framework_tests:
    name: "test; Dart 3.6.2; PKG: _tests (vm + browser)"
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6.2"
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: "_tests; dart pub get"
        run: dart pub get
        working-directory: _tests
      - name: "_tests; dart run build_runner build --fail-on-severe"
        run: dart run build_runner build --fail-on-severe
        working-directory: _tests
      - name: "_tests; dart run test -P vm"
        run: dart run test -P vm
        working-directory: _tests
      - name: "_tests; dart run build_runner test --fail-on-severe -- -P browser"
        run: dart run build_runner test --fail-on-severe -- -P browser
        working-directory: _tests

  builds:
    name: "build; Dart 3.6.2; goldens + hello_world"
    runs-on: ubuntu-latest
    needs: analyze
    steps:
      - name: Setup Dart SDK
        uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.6.2"
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: "goldens; dart pub get"
        run: dart pub get
        working-directory: goldens
      - name: "goldens; dart run build_runner build --fail-on-severe"
        run: dart run build_runner build --fail-on-severe
        working-directory: goldens
      - name: "hello_world; dart pub get"
        run: dart pub get
        working-directory: examples/hello_world
      - name: "hello_world; dart run build_runner build --fail-on-severe"
        run: dart run build_runner build --fail-on-severe
        working-directory: examples/hello_world
